name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths-ignore:
      - "LICENSE"
      - "frontend/site/**"

jobs:
  check-issue-link:
    name: PR links to an issue
    runs-on: ubuntu-latest
    steps:
      - name: Verify issue reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! echo "$PR_BODY" | grep -iE "(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+"; then
            echo "PR body must reference a GitHub issue."
            echo "Add one of: Closes #N, Fixes #N, Resolves #N"
            exit 1
          fi
          echo "Issue reference found."

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check-issue-link
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v

  docs-build:
    name: Docs build
    runs-on: ubuntu-latest
    needs: check-issue-link
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build

  notify:
    name: Notify maintainer
    runs-on: ubuntu-latest
    needs: [test, docs-build]
    if: needs.test.result == 'success' && needs.docs-build.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ All checks passed! @${context.repo.owner} — ready for review and merge.`
            })
