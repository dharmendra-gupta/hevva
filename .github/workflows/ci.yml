name: CI

on:
  push:
    branches: [stage]
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  check-issue-link:
    name: PR links to an issue
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Verify issue reference in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! echo "$PR_BODY" | grep -iE "(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+"; then
            echo "PR body must reference a GitHub issue."
            echo "Add one of: Closes #N, Fixes #N, Resolves #N"
            exit 1
          fi
          echo "Issue reference found."

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: check-issue-link
    if: always() && (github.event_name == 'push' || needs.check-issue-link.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/ -v

  notify:
    name: Notify maintainer
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && needs.test.result == 'success'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ All checks passed! @${context.repo.owner} — ready for review and merge.`
            })
