# Use this if you want to host Hevva under a path on an existing domain
# e.g. https://yourdomain.com/hevva/webhook
#
# Add the upstream block and location block to your existing server config.
# The rewrite rule strips /hevva before forwarding to the app.

upstream hevva {
  zone hevva 64k;
  server hevva:8000;
  keepalive 2;
}

