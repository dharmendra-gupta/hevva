site_name: hevva
site_description: Event-driven sync engine for dual-tracking athletes — inject Hevy workout data into Strava automatically.
site_url: https://dharmendra-gupta.github.io/hevva/
repo_url: https://github.com/dharmendra-gupta/hevva
repo_name: dharmendra-gupta/hevva
edit_uri: ""
docs_dir: frontend/docs
site_dir: frontend/site

theme:
  name: material
  logo: assets/images/hevva-mark.svg
  favicon: assets/images/favicon-32.png
  font:
    text: Space Grotesk
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Setup: setup.md
  - Networking: networking.md
  - Configuration: configuration.md
  - FAQ: faq.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
