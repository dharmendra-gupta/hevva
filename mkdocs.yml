site_name: Hevva
site_description: Event-driven sync engine for dual-tracking athletes — inject Hevy workout data into Strava automatically.
site_url: https://dharmendra-gupta.github.io/hevva/
repo_url: https://github.com/dharmendra-gupta/hevva
repo_name: dharmendra-gupta/hevva
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Setup: setup.md
  - Networking: networking.md
  - Configuration: configuration.md
  - FAQ: faq.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
